modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/RaeYNCreations/Hallowed/issues"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    description='''${mod_description}'''
    authors="${mod_authors}"

[[dependencies.hallowed]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.hallowed]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.hallowed]]
    modId="lightmanscurrency"
    type="required"
    # TODO: Set a concrete version range once the minimum tested LC version is known.
    # e.g., "[2.0.0,3.0.0)" to restrict to a tested major version.
    versionRange="[*,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.hallowed]]
    modId="bonfires"
    type="required"
    # TODO: Set a concrete version range once the minimum tested Bonfires version is known.
    # e.g., "[1.0.0,2.0.0)" to restrict to a tested major version.
    versionRange="[*,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.hallowed]]
    modId="youdied"
    type="optional"
    versionRange="[*,)"
    ordering="NONE"
    side="BOTH"
